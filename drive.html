    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    .container {
      width: 100%;

    .label {

      letter-spacing: 0.18em;

      color: #7a7060;
      margin-bottom: 0.6rem;

    }

    .divider {
      width: 48px;
      height: 2px;
      background: #c9a96e;
      margin-top: 1.2rem;
    }

    .link-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-item a {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.1rem 1.4rem;
      border: 0.5px solid #2a2720;
      border-radius: 10px;
      background: #141310;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      cursor: pointer;
    }

    .link-item a:hover {
      background: #1e1c18;
      border-color: #c9a96e44;
      transform: translateX(4px);
    }

    .link-number {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #c9a96e;
      min-width: 22px;
      font-weight: 500;
    }

    .link-name {
      font-size: 15px;
      font-weight: 400;
      color: #d8d4cb;
      flex: 1;
      letter-spacing: 0.01em;
    }

    .link-arrow {
      font-size: 14px;
      color: #4a4640;
      transition: color 0.2s, transform 0.2s;
    }

    .link-item a:hover .link-arrow {
      color: #c9a96e;
      transform: translateX(2px);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 12px;
      color: #3d3a34;
      text-align: center;
      letter-spacing: 0.06em;
    }
  </style>
